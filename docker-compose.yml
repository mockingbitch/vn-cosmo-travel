services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vncosmo_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: vncosmo_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: vncosmo_mysql
    ports:
      - "3303:3306"
    environment:
      MYSQL_DATABASE: vncosmo
      MYSQL_USER: vncosmo
      MYSQL_PASSWORD: vncosmo
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - vncosmo_mysql_data:/var/lib/mysql

volumes:
  vncosmo_mysql_data:

